<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Evolución de Carriles Bici en Barcelona</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Hojas de estilo oficiales de Mapbox -->
    <link href="https://mapbox.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Librería Javascript oficial de Mapbox (Cargada obligatoriamente antes de app.js) -->
    <script src="https://mapbox.com"></script>
    <script src="app.js" defer></script>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <h3>Red Ciclista Barcelona</h3>
    <p>Desplaza el selector para ver la evolución temporal:</p>
    <input id="slider" type="range" min="0" max="2" step="1" value="0">
    <div id="year-label">Año 2017</div>
</div>

</body>
</html>
